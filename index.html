<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Garden</title>
  <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>
  <main class="game-shell">
    <section class="top-bar" aria-label="Game status">
      <button id="exit-btn" type="button" class="exit-button" title="Exit game" aria-label="Exit game">Exit</button>
      <div>
        <p class="eyebrow">Puzzle <span id="level-number">1</span></p>
        <h1>Word Garden</h1>
      </div>
      <div class="score-card" aria-live="polite">
        <span>Coins</span>
        <strong id="coins">1000000</strong>
      </div>
    </section>

    <section class="board-wrap" aria-label="Word board">
      <div id="word-board" class="word-board"></div>
    </section>

    <section class="entry-panel" aria-label="Current word">
      <div id="current-word" class="current-word" aria-live="polite"></div>
      <p id="message" class="message" aria-live="polite">Select letters to make a word.</p>
    </section>

    <section class="wheel-wrap" aria-label="Letter wheel">
      <div id="letter-wheel" class="letter-wheel"></div>
    </section>

    <section class="controls" aria-label="Game controls">
      <button id="clear-btn" type="button" title="Clear selected letters" aria-label="Clear selected letters">&times;</button>
      <button id="shuffle-btn" type="button" title="Shuffle letters" aria-label="Shuffle letters">&#8635;</button>
      <button id="submit-btn" type="button" class="primary" title="Submit word" aria-label="Submit word">&#10003;</button>
      <button id="hint-btn" type="button" title="Reveal one letter" aria-label="Reveal one letter">?</button>
    </section>
  </main>
  <section id="exit-screen" class="exit-screen" aria-live="polite" hidden>
    <h2>Game saved</h2>
    <p>You can close this tab.</p>
  </section>

  <script src="word-bank.js?v=15"></script>
  <script src="chinese-meanings.js?v=15"></script>
  <script src="game.js?v=15"></script>
</body>
</html>
